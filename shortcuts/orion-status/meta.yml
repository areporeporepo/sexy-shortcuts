description: "A daily Artemis mission log, the ISS-tracker idea pointed at the Moon. Fetches live Orion capsule telemetry (distance from Moon, mission phase, crew, Deep Space Network dish) plus the latest Starship propellant-transfer schedule, then an on-device AAPL Foundation Model writes a one-screen mission update and appends it to a running Notes log. Optionally drops Orion's sub-point on a map."
