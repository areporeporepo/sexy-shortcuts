name: Vet shortcuts
on:
  pull_request:
    paths: ["shortcuts/**"]
jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m pytest -q -m "not network"
      - run: python -m scripts.vet_pr
