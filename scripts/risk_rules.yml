# Each rule maps a Shortcuts action identifier to a risk tier, a score penalty,
# and a human-readable reason shown in SAFETY.md. Tiers: red > yellow > green.
default_unknown:
  tier: yellow
  weight: 10
  reason: "Unrecognized action — treated as medium risk until reviewed."
rules:
  - id: is.workflow.actions.runshellscript
    tier: red
    weight: 60
    reason: "Runs a shell script — arbitrary code execution on macOS."
  - id: is.workflow.actions.runsshscript
    tier: red
    weight: 60
    reason: "Runs commands on a remote host over SSH."
  - id: is.workflow.actions.runjavascriptonwebpage
    tier: red
    weight: 40
    reason: "Injects and runs JavaScript in a web page."
  - id: is.workflow.actions.downloadurl
    tier: yellow
    weight: 20
    reason: "Sends a network request / downloads from a URL — possible exfiltration."
  - id: is.workflow.actions.getmycontacts
    tier: yellow
    weight: 15
    reason: "Reads your contacts."
  - id: is.workflow.actions.getcurrentlocation
    tier: yellow
    weight: 15
    reason: "Reads your current location."
  - id: is.workflow.actions.getclipboard
    tier: yellow
    weight: 15
    reason: "Reads the clipboard contents."
  - id: is.workflow.actions.openapp
    tier: yellow
    weight: 5
    reason: "Opens another app."
  - id: is.workflow.actions.gettext
    tier: green
    weight: 0
    reason: "Creates static text."
  - id: is.workflow.actions.showresult
    tier: green
    weight: 0
    reason: "Shows a result on screen."
  - id: is.workflow.actions.list
    tier: green
    weight: 0
    reason: "Defines a static list of items."
  - id: is.workflow.actions.getitemfromlist
    tier: green
    weight: 0
    reason: "Picks an item from a list (device-local)."
  - id: is.workflow.actions.alert
    tier: green
    weight: 0
    reason: "Shows an on-screen alert."
  - id: is.workflow.actions.shownotification
    tier: green
    weight: 0
    reason: "Posts a local notification."
  - id: is.workflow.actions.speaktext
    tier: green
    weight: 0
    reason: "Speaks text aloud (device-local)."
  - id: is.workflow.actions.choosefrommenu
    tier: green
    weight: 0
    reason: "Shows a local menu to choose from."
  - id: is.workflow.actions.comment
    tier: green
    weight: 0
    reason: "A non-executing comment."
  - id: is.workflow.actions.url
    tier: green
    weight: 0
    reason: "Defines a URL value (does not make a request by itself)."
  - id: is.workflow.actions.openurl
    tier: yellow
    weight: 5
    reason: "Opens a URL in the browser — a visible side effect, leaves the app."
  - id: is.workflow.actions.getupcomingevents
    tier: yellow
    weight: 15
    reason: "Reads your calendar events."
  - id: is.workflow.actions.getweatherconditions
    tier: yellow
    weight: 10
    reason: "Reads weather for your current location."
  - id: is.workflow.actions.getupcomingreminders
    tier: yellow
    weight: 10
    reason: "Reads your reminders."
  - id: is.workflow.actions.ask
    tier: green
    weight: 0
    reason: "Asks you for input (device-local)."
  - id: is.workflow.actions.date
    tier: green
    weight: 0
    reason: "Gets a date (device-local)."
  - id: is.workflow.actions.appendnote
    tier: green
    weight: 0
    reason: "Appends text to one of your own Notes (device-local, no network)."
  - id: is.workflow.actions.gethealthsample
    tier: yellow
    weight: 15
    reason: "Reads Health data (e.g. heart rate)."
  - id: is.workflow.actions.conditional
    tier: green
    weight: 0
    reason: "Branches on a condition (control flow)."
  - id: is.workflow.actions.base64encode
    tier: yellow
    weight: 15
    reason: "Base64-encodes data — common before sending a payload to a server."
  - id: is.workflow.actions.getlastscreenshot
    tier: yellow
    weight: 15
    reason: "Reads your most recent screenshot/photo."
